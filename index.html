<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordBook — 英単語帳</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2c2c3e;
  --ink-light: #5a5a7a;
  --ink-faint: #9090b0;
  --paper: #fafaf7;
  --paper-warm: #f4f2ed;
  --paper-card: #ffffff;
  --card-back-bg: #f5f2ec;
  --card-back-text: #2c2c3e;
  --accent: #e85d26;
  --accent-muted: #f5a07a;
  --accent-bg: #fff3ee;
  --start-btn: #5b8fdf;
  --start-btn-hover: #4678c8;
  --good: #2d9e6b;
  --good-bg: #e8f7f1;
  --so-so: #c47c00;
  --so-so-bg: #fff8e7;
  --bad: #c0392b;
  --bad-bg: #fdecea;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 16px;
  --radius-sm: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:16px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5;}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid rgba(0,0,0,0.06);background:var(--paper);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);display:flex;align-items:baseline;gap:4px;}
.logo span{color:var(--accent);}
.header-user{font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:8px;}
.btn-icon{width:32px;height:32px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:var(--paper-card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;box-shadow:var(--shadow-sm);}
.btn-icon:hover{background:var(--paper-warm);transform:scale(1.05);}

/* Screens */
.screen{display:none;flex:1;padding:20px;flex-direction:column;gap:16px;animation:fadeUp .3s ease;}
.screen.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* Panel */
.panel{background:var(--paper-card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,0.05);}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;transition:all .2s;text-decoration:none;user-select:none;}
.btn-primary{background:var(--ink);color:#fff;box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:#3d3d5a;transform:translateY(-1px);box-shadow:var(--shadow-md);}
.btn-accent{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm);}
.btn-accent:hover{background:#c44d1e;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid rgba(0,0,0,0.15);}
.btn-outline:hover{background:var(--paper-warm);border-color:rgba(0,0,0,0.25);}
.btn-ghost{background:transparent;color:var(--ink-light);}
.btn-ghost:hover{background:var(--paper-warm);color:var(--ink);}
.btn-good{background:#d4f5e6;color:#1c2e26;border:1.5px solid #a8e6cc;}
.btn-good:hover{background:#bfedd8;border-color:#7dd6b0;}
.btn-so-so{background:#fde9ba;color:#2e2310;border:1.5px solid #f5cf7a;}
.btn-so-so:hover{background:#fada98;border-color:#e8bb40;}
.btn-bad{background:#fddcda;color:#2e1212;border:1.5px solid #f5aaaa;}
.btn-bad:hover{background:#fcc8c5;border-color:#e87878;}
.btn-full{width:100%;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}

/* Inputs */
.input-group{display:flex;flex-direction:column;gap:6px;}
.label{font-size:12px;font-weight:600;color:var(--ink-light);letter-spacing:.05em;text-transform:uppercase;}
.input{padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid rgba(0,0,0,0.12);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);transition:border-color .2s,box-shadow .2s;outline:none;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,93,38,0.12);}
textarea.input{resize:vertical;min-height:80px;}
select.input{cursor:pointer;}

/* HOME */
.home-greeting{font-size:13px;color:var(--ink-faint);margin-bottom:4px;}
.home-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);line-height:1.2;margin-bottom:16px;}
.home-title span{color:var(--accent);}
.stats-row{display:flex;gap:10px;}
.stat-chip{flex:1;background:var(--paper-card);border-radius:var(--radius-sm);padding:14px 12px;border:1px solid rgba(0,0,0,0.06);box-shadow:var(--shadow-sm);text-align:center;}
.stat-chip .num{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--accent);}
.stat-chip .lbl{font-size:11px;color:var(--ink-faint);margin-top:2px;}
/* Home start area */
.home-start-area{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);border:1.5px solid rgba(0,0,0,0.06);}
.home-start-row{display:flex;gap:10px;align-items:center;}
.home-group-select{flex:1;padding:12px 14px;font-size:14px;background:var(--paper);border:1.5px solid rgba(0,0,0,0.12);border-radius:var(--radius-sm);color:var(--ink);cursor:pointer;outline:none;transition:border-color .2s;}
.home-group-select:focus{border-color:var(--start-btn);}
.home-btn-start{flex-shrink:0;background:var(--start-btn);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 18px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm);white-space:nowrap;}
.home-btn-start:hover{background:var(--start-btn-hover);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.home-btn{background:var(--paper-card);border:1.5px solid rgba(0,0,0,0.08);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all .2s;text-align:left;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px;}
.home-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent-muted);}
.home-btn-icon{font-size:24px;}
.home-btn-label{font-size:14px;font-weight:600;color:var(--ink);}
.home-btn-sub{font-size:11px;color:var(--ink-faint);}
/* 10問スタート — friendly blue */
.home-btn.primary-action{grid-column:1/-1;background:var(--start-btn);color:#fff;flex-direction:row;align-items:center;gap:14px;}
.home-btn.primary-action .home-btn-label{color:#fff;font-size:17px;}
.home-btn.primary-action .home-btn-sub{color:rgba(255,255,255,.75);}
.home-btn.primary-action:hover{background:var(--start-btn-hover);}

/* Sound settings */
.sound-panel{background:var(--paper-card);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:10px;}
.sound-panel-title{font-size:12px;font-weight:600;color:var(--ink-light);}
.sound-controls{display:flex;align-items:center;gap:12px;width:100%;min-width:0;}
.volume-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;}
.volume-wrap input[type=range]{flex:1;min-width:0;width:100%;height:4px;border-radius:2px;accent-color:var(--accent);cursor:pointer;}
.vol-icon{font-size:16px;flex-shrink:0;}

/* Toggle switch */
.toggle-row{display:flex;align-items:center;gap:8px;}
.toggle-label{font-size:12px;color:var(--ink-light);}
.toggle-switch{width:36px;height:20px;background:var(--paper-warm);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;border:1.5px solid rgba(0,0,0,0.1);flex-shrink:0;}
.toggle-switch.on{background:var(--accent);}
.toggle-knob{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:1px;left:1px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-switch.on .toggle-knob{left:19px;}

/* LOGIN */
.login-header{text-align:center;padding:20px 0 8px;}
.login-header .logo-big{font-family:'Playfair Display',serif;font-size:36px;color:var(--ink);}
.login-header .logo-big span{color:var(--accent);}
.login-sub{font-size:14px;color:var(--ink-faint);margin-top:8px;}
.tab-row{display:flex;background:var(--paper-warm);border-radius:var(--radius-sm);padding:4px;gap:2px;}
.tab-btn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;background:transparent;color:var(--ink-faint);transition:all .2s;}
.tab-btn.active{background:var(--paper-card);color:var(--ink);box-shadow:var(--shadow-sm);}

/* QUIZ MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:500;animation:fadeIn .2s;}
.modal-overlay.hidden{display:none;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-sheet{background:var(--paper-card);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 40px;width:100%;max-width:480px;animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--ink-faint);margin-bottom:16px;}
.group-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.group-chip{padding:8px 16px;border-radius:50px;border:1.5px solid rgba(0,0,0,0.12);font-size:14px;cursor:pointer;transition:all .2s;background:var(--paper-card);color:var(--ink-light);user-select:none;}
.group-chip.selected{background:var(--start-btn);color:#fff;border-color:var(--start-btn);}
.group-chip.all-chip.selected{background:var(--ink);border-color:var(--ink);}

/* QUIZ */
.quiz-header{display:flex;align-items:center;justify-content:space-between;}
.quiz-count{font-family:'DM Mono',monospace;font-size:20px;color:var(--ink);font-weight:500;}
.quiz-group-tag{font-size:11px;color:var(--accent);margin-top:2px;}
.progress-bar{height:4px;background:var(--paper-warm);border-radius:2px;margin-top:4px;width:120px;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
.timer-circle{width:44px;height:44px;position:relative;}
.timer-svg{transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--paper-warm);stroke-width:4;}
.timer-arc{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .5s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--ink);}
.timer-urgent .timer-arc{stroke:var(--bad);}
.timer-urgent .timer-num{color:var(--bad);}

/* Flash Card */
.card-scene{perspective:1200px;height:220px;cursor:pointer;position:relative;}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);position:relative;}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper-card);border-radius:var(--radius);border:1.5px solid rgba(0,0,0,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--shadow-md);}
/* 答え面: ほんのり温かみのある白、文字は黒系 */
.card-face.back{transform:rotateY(180deg);background:var(--card-back-bg);color:var(--card-back-text);border-color:rgba(0,0,0,0.08);}
/* 裏面テキストを隠す — フリップ完了後に外す */
#card-back.back-hidden{opacity:0;}
.card-word{font-family:'Playfair Display',serif;font-size:32px;text-align:center;line-height:1.2;white-space:pre-wrap;word-break:break-word;}
.card-hint{font-size:12px;opacity:.4;margin-top:10px;}
.card-memo-text{font-size:14px;color:var(--ink-light);text-align:center;margin-top:8px;padding:10px 14px;background:#ece9e3;border:1px solid rgba(0,0,0,0.08);border-radius:var(--radius-sm);display:none;line-height:1.6;}
.card-memo-text.visible{display:block;}
.card-actions-row{display:flex;gap:10px;align-items:center;}
.speak-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.12);background:var(--paper-card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
.speak-btn:hover{background:var(--accent-bg);border-color:var(--accent);}
.btn-memo-na{opacity:.35;cursor:not-allowed!important;}
.flip-hint{font-size:12px;color:var(--ink-faint);}
.judge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
.judge-row .btn{flex-direction:column;gap:4px;padding:12px 8px;}
.judge-row .btn span.lbl{font-size:14px;font-weight:600;}
.judge-row .btn span.icon{font-size:22px;}

/* Reverse toggle */
.reverse-toggle{position:fixed;bottom:20px;right:16px;z-index:200;background:var(--paper-card);border-radius:50px;padding:8px 14px;box-shadow:var(--shadow-md);border:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-light);}

/* RESULT */
.result-score{text-align:center;padding:8px 0;}
.result-score .score-num{font-family:'DM Mono',monospace;font-size:56px;color:var(--accent);font-weight:500;}
.result-score .score-label{font-size:14px;color:var(--ink-faint);}
.result-list{display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;}
.result-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--paper-card);border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:all .2s;}
.result-item:hover{background:var(--paper-warm);}
.result-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.badge-good{background:var(--good-bg);color:var(--good);}
.badge-so-so{background:var(--so-so-bg);color:var(--so-so);}
.badge-bad{background:var(--bad-bg);color:var(--bad);}
.result-word{font-weight:600;font-size:15px;}
.result-answer{font-size:13px;color:var(--ink-faint);display:none;}
.result-answer.visible{display:block;}

/* REGISTER */
.register-form{display:flex;flex-direction:column;gap:14px;}

/* CARD LIST */
.sort-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.sort-chip{padding:7px 14px;border-radius:50px;border:1.5px solid rgba(0,0,0,0.1);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;background:var(--paper-card);color:var(--ink-light);}
.sort-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.card-list{display:flex;flex-direction:column;gap:8px;}
.card-list-item{background:var(--paper-card);border-radius:var(--radius-sm);padding:14px;border:1px solid rgba(0,0,0,0.06);box-shadow:var(--shadow-sm);}
.cli-group-tag{display:inline-block;padding:2px 10px;border-radius:50px;font-size:11px;background:var(--paper-warm);color:var(--ink-light);border:1px solid rgba(0,0,0,0.08);margin-bottom:4px;}
.cli-front{font-weight:600;font-size:15px;margin-bottom:4px;}
.cli-back{font-size:13px;color:var(--ink-faint);}
.cli-meta{font-size:11px;color:var(--ink-faint);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap;}
.cli-memo-btn{display:inline-block;margin-top:8px;font-size:12px;color:var(--ink-light);cursor:pointer;padding:4px 10px;background:var(--paper-warm);border:1px solid rgba(0,0,0,0.08);border-radius:50px;transition:all .15s;user-select:none;}
.cli-memo-btn:hover{background:#e8e4dc;color:var(--ink);}
.cli-memo-body{margin-top:8px;font-size:13px;color:var(--ink-light);background:#ece9e3;border:1px solid rgba(0,0,0,0.08);border-radius:var(--radius-sm);padding:10px 12px;line-height:1.7;white-space:pre-wrap;}
.cli-actions{display:flex;gap:8px;margin-top:10px;}
.cli-btn{padding:6px 14px;border-radius:var(--radius-sm);border:1.5px solid rgba(0,0,0,0.1);background:transparent;font-size:13px;cursor:pointer;transition:all .2s;}
.cli-btn:hover{background:var(--paper-warm);}
.cli-btn.del{color:var(--bad);border-color:rgba(192,57,43,.2);}
.cli-btn.del:hover{background:var(--bad-bg);border-color:var(--bad);}

/* Utility */
.gap-row{display:flex;gap:10px;}
.gap-row .btn{flex:1;}
.section-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;}
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:14px;}
.alert-error{background:var(--bad-bg);color:var(--bad);border:1px solid rgba(192,57,43,.2);}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-faint);}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.text-small{font-size:13px;color:var(--ink-faint);}
.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="goHome()" style="cursor:pointer;user-select:none" title="ホームへ">Word<span>Book</span></div>
  <div class="header-user">
    <span id="header-email"></span>
    <button class="btn-icon hidden" id="btn-logout" title="ログアウト">🚪</button>
  </div>
</div>

<div class="app">

<!-- ══ LOGIN ══ -->
<div class="screen active" id="screen-login">
  <div class="login-header">
    <div class="logo-big">Word<span>Book</span></div>
    <div class="login-sub">あなたの英単語帳</div>
  </div>
  <div class="panel">
    <div class="tab-row" style="margin-bottom:16px">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="tab-btn" id="tab-reg" onclick="switchTab('reg')">新規登録</button>
    </div>
    <div id="form-login">
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="input-group"><div class="label">メールアドレス</div><input class="input" id="login-email" type="email" placeholder="you@example.com"></div>
        <div class="input-group"><div class="label">パスワード</div><input class="input" id="login-pass" type="password" placeholder="••••••••"></div>
        <div id="login-error"></div>
        <button class="btn btn-primary btn-full" id="btn-do-login" onclick="doLogin()">ログイン</button>
      </div>
    </div>
    <div id="form-reg" style="display:none">
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="input-group"><div class="label">メールアドレス</div><input class="input" id="reg-email" type="email" placeholder="you@example.com"></div>
        <div class="input-group"><div class="label">パスワード（6文字以上）</div><input class="input" id="reg-pass" type="password" placeholder="••••••••"></div>
        <div id="reg-error"></div>
        <button class="btn btn-accent btn-full" id="btn-do-reg" onclick="doRegister()">アカウントを作成</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ HOME ══ -->
<div class="screen" id="screen-home">
  <div>
    <div class="home-greeting">おかえりなさい 👋</div>
    <div class="home-title">今日も<span>単語</span>を覚えよう</div>
    <div class="stats-row">
      <div class="stat-chip"><div class="num" id="stat-total">—</div><div class="lbl">登録数</div></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, getDocs, updateDoc, deleteDoc, query, orderBy, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyCkDo2Cny7tOOBpfcPhKuuCwvrQhyN3_3g",
  authDomain:"sy-wordbook.firebaseapp.com",
  projectId:"sy-wordbook",
  storageBucket:"sy-wordbook.firebasestorage.app",
  messagingSenderId:"492093016264",
  appId:"1:492093016264:web:f485a25781b5f55a893dfd"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──
let currentUser = null;
let allCards = [];
let allGroups = ['未分類'];
let quizCards = [], quizIndex = 0, quizResults = [];
let isFlipped = false, isReverse = false;
let timerInterval = null, timerSeconds = 15;
let lastSavedId = null, currentSort = 'newest';
let soundOn = true, soundVol = 0.8;
let selectedGroups = ['__all__'];
const CIRC = 2 * Math.PI * 18;

// ── Sound ──
window.toggleSound = () => {
  soundOn = !soundOn;
  document.getElementById('sound-switch').classList.toggle('on', soundOn);
  updateVolIcon();
};
window.updateVolume = (v) => { soundVol = parseFloat(v); updateVolIcon(); };
function updateVolIcon() {
  const el = document.getElementById('vol-icon');
  el.textContent = (!soundOn || soundVol===0) ? '🔇' : soundVol < 0.4 ? '🔈' : '🔊';
}

// ── Auth ──
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('header-email').textContent = user.email.split('@')[0];
    document.getElementById('btn-logout').classList.remove('hidden');
    loadCards().then(() => showScreen('screen-home'));
  } else {
    document.getElementById('header-email').textContent = '';
    document.getElementById('btn-logout').classList.add('hidden');
    showScreen('screen-login');
  }
});
window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.innerHTML = '';
  const btn = document.getElementById('btn-do-login');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { errEl.innerHTML=`<div class="alert alert-error">${authMsg(e.code)}</div>`; btn.disabled=false; btn.textContent='ログイン'; }
};
window.doRegister = async () => {
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const errEl = document.getElementById('reg-error');
  errEl.innerHTML = '';
  const btn = document.getElementById('btn-do-reg');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try { await createUserWithEmailAndPassword(auth, email, pass); }
  catch(e) { errEl.innerHTML=`<div class="alert alert-error">${authMsg(e.code)}</div>`; btn.disabled=false; btn.textContent='アカウントを作成'; }
};
document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
function authMsg(c) {
  return {'auth/user-not-found':'ユーザーが見つかりません','auth/wrong-password':'パスワードが違います','auth/invalid-email':'メールアドレスの形式が正しくありません','auth/email-already-in-use':'このアドレスは既に使用中です','auth/weak-password':'パスワードは6文字以上','auth/invalid-credential':'メールアドレスまたはパスワードが間違っています'}[c] || `エラー: ${c}`;
}
window.switchTab = (m) => {
  document.getElementById('tab-login').classList.toggle('active', m==='login');
  document.getElementById('tab-reg').classList.toggle('active', m==='reg');
  document.getElementById('form-login').style.display = m==='login'?'':'none';
  document.getElementById('form-reg').style.display   = m==='reg'?'':'none';
};

// ── Firestore ──
function cardsRef() { return collection(db, `users/${currentUser.uid}/cards`); }

async function loadCards() {
  const snap = await getDocs(query(cardsRef(), orderBy('createdAt','desc')));
  allCards = snap.docs.map(d => ({id:d.id,...d.data()}));
  const gs = new Set(['未分類']);
  allCards.forEach(c => { if(c.group) gs.add(c.group); });
  allGroups = Array.from(gs);
  updateStats(); rebuildSelects();
}
function rebuildSelects() {
  const opts = `<option value="__all__">🌐 すべてのグループ</option>`
    + allGroups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
  // home group select
  const hg = document.getElementById('home-group-select');
  const hgPrev = hg ? hg.value : '__all__';
  if (hg) { hg.innerHTML = opts; if (hgPrev) hg.value = hgPrev; }
  // add-group
  const ag = document.getElementById('add-group');
  const agPrev = ag.value;
  ag.innerHTML = allGroups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
  if (agPrev && allGroups.includes(agPrev)) ag.value = agPrev;
  // list-filter
  const lf = document.getElementById('list-filter');
  const lfPrev = lf.value;
  lf.innerHTML = `<option value="__all__">すべてのグループ</option>`+allGroups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
  if (lfPrev) lf.value = lfPrev;
}
function updateStats() {
  const now = new Date();
  let todayN=0, mastN=0;
  allCards.forEach(c => {
    if (!c.nextDate || c.nextDate.toDate()<=now) todayN++;
    if ((c.score||0)>=3) mastN++;
  });
  document.getElementById('stat-total').textContent   = allCards.length;
  document.getElementById('stat-today').textContent   = todayN;
  document.getElementById('stat-mastered').textContent = mastN;
}

// ── Screens ──
window.showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('reverse-toggle').classList.add('hidden');
  if (id==='screen-list') renderCardList();
};
window.openAddScreen = () => {
  addCalledFromList = false;
  document.getElementById('edit-id').value='';
  document.getElementById('add-front').value='';
  document.getElementById('add-back').value='';
  document.getElementById('add-memo').value='';
  document.getElementById('add-error').innerHTML='';
  document.getElementById('post-save').style.display='none';
  document.getElementById('add-title').textContent='新しい単語を登録';
  document.getElementById('btn-save').textContent='💾 保存';
  document.getElementById('new-group-row').style.display='none';
  rebuildSelects();
  showScreen('screen-add');
};

// ── Group management (add screen) ──
window.showNewGroupRow = () => {
  document.getElementById('new-group-row').style.display='';
  document.getElementById('new-group-name').focus();
};
window.cancelNewGroup = () => {
  document.getElementById('new-group-row').style.display='none';
  document.getElementById('new-group-name').value='';
};
window.addNewGroup = () => {
  const name = document.getElementById('new-group-name').value.trim();
  if (!name) return;
  if (!allGroups.includes(name)) allGroups.push(name);
  rebuildSelects();
  document.getElementById('add-group').value = name;
  cancelNewGroup();
};

// ── Quiz start from home ──
window.startQuizFromHome = async () => {
  const sel = document.getElementById('home-group-select');
  const val = sel ? sel.value : '__all__';
  selectedGroups = val === '__all__' ? ['__all__'] : [val];
  await startQuiz();
};

// ── Quiz ──
async function startQuiz() {
  if (!allCards.length) { alert('単語が登録されていません。'); return; }
  await loadCards();
  const now = new Date();
  let pool = selectedGroups.includes('__all__') ? allCards
    : allCards.filter(c=>selectedGroups.includes(c.group||'未分類'));
  if (!pool.length) { alert('選択したグループに単語がありません。'); return; }
  let due = pool.filter(c=>!c.nextDate||c.nextDate.toDate()<=now);
  pool = [...(due.length>=10?due:pool)].sort(()=>Math.random()-.5);
  quizCards = pool.slice(0,Math.min(10,pool.length));
  quizIndex=0; quizResults=[];
  const tag = selectedGroups.includes('__all__')?'':selectedGroups.join('・');
  document.getElementById('q-group-tag').textContent = tag?`[${tag}]`:'';
  document.getElementById('q-tot').textContent = quizCards.length;
  showScreen('screen-quiz');
  document.getElementById('reverse-toggle').classList.remove('hidden');
  loadQuestion();
}

function loadQuestion() {
  if (quizIndex>=quizCards.length) { showResult(); return; }
  stopTimer(); isFlipped=false;
  const card=quizCards[quizIndex];
  const frontW = isReverse?card.back:card.front;
  const backW  = isReverse?card.front:card.back;

  const inner  = document.getElementById('card-inner');
  const backEl = document.getElementById('card-back');

  // ① 裏面テキストだけ即座に非表示にしてからDOM書き換え
  backEl.classList.add('back-hidden');

  // ② トランジションなしでフリップをリセット
  inner.style.transition = 'none';
  inner.classList.remove('flipped');

  // ③ テキスト・UI更新
  document.getElementById('card-front').textContent = frontW;
  backEl.textContent = backW;
  document.getElementById('card-memo').textContent  = card.memo||'';
  document.getElementById('card-memo').classList.remove('visible');
  document.getElementById('judge-area').style.display='none';
  document.getElementById('not-flipped-msg').style.display='';
  document.getElementById('q-cur').textContent = quizIndex+1;
  document.getElementById('q-bar').style.width = ((quizIndex+1)/quizCards.length*100)+'%';

  // メモボタン: メモなしは無効化
  const memoBtn = document.getElementById('btn-memo');
  const hasMemo = !!(card.memo&&card.memo.trim());
  memoBtn.disabled = !hasMemo;
  memoBtn.classList.toggle('btn-memo-na', !hasMemo);
  memoBtn.title = hasMemo?'':'メモがありません';

  // ④ 1フレーム後にトランジションを復元して読み上げ・タイマー開始
  //    裏面テキストはフリップアニメーション(500ms)完了後に表示
  requestAnimationFrame(()=>{
    inner.style.transition = '';
    // 読み上げは改行を除去したテキストを使う
    if (soundOn) speakText(frontW.replace(/\n/g,' '), isReverse?'ja-JP':'en-US');
    startTimer();
    setTimeout(()=>{ backEl.classList.remove('back-hidden'); }, 550);
  });
}

window.flipCard = () => {
  if (isFlipped) return;
  isFlipped=true;
  document.getElementById('card-inner').classList.add('flipped');
  document.getElementById('judge-area').style.display='';
  document.getElementById('not-flipped-msg').style.display='none';
  stopTimer();
};
window.toggleMemo = () => {
  const card=quizCards[quizIndex];
  if (!card||!card.memo) return;
  document.getElementById('card-memo').classList.toggle('visible');
};
window.judge = async (result) => {
  const card=quizCards[quizIndex];
  quizResults.push({card,result});
  const today=new Date(); today.setHours(0,0,0,0);
  let score=card.score||0, nextDate;
  if (result==='good'){
    score=Math.min(score+1,5);
    const d=new Date(today); d.setDate(d.getDate()+[1,3,7,14,30][Math.min(score-1,4)]);
    nextDate=Timestamp.fromDate(d);
  } else if (result==='soso'){
    score=Math.max(score-1,0);
    const d=new Date(today); d.setDate(d.getDate()+1);
    nextDate=Timestamp.fromDate(d);
  } else {
    score=0; nextDate=Timestamp.fromDate(today);
  }
  try { await updateDoc(doc(db,`users/${currentUser.uid}/cards/${card.id}`),{nextDate,score,updatedAt:Timestamp.now()}); }
  catch(e){ console.warn(e); }
  quizIndex++; loadQuestion();
};

// ── Timer ──
function startTimer() {
  timerSeconds=15; updateTimerUI();
  timerInterval=setInterval(()=>{
    timerSeconds--; updateTimerUI();
    if (timerSeconds<=0){ stopTimer(); autoFail(); }
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); timerInterval=null; }
function updateTimerUI(){
  document.getElementById('timer-num').textContent=timerSeconds;
  document.getElementById('timer-arc').style.strokeDashoffset=CIRC*(1-timerSeconds/15);
  document.getElementById('timer-circle').classList.toggle('timer-urgent',timerSeconds<=5);
}
function autoFail(){
  const card=quizCards[quizIndex];
  quizResults.push({card,result:'bad'});
  const today=new Date(); today.setHours(0,0,0,0);
  updateDoc(doc(db,`users/${currentUser.uid}/cards/${card.id}`),{nextDate:Timestamp.fromDate(today),score:0,updatedAt:Timestamp.now()}).catch(()=>{});
  quizIndex++; loadQuestion();
}

// ── Result ──
function showResult(){
  stopTimer();
  const good=quizResults.filter(r=>r.result==='good').length;
  document.getElementById('res-score').textContent=good;
  document.getElementById('res-total').textContent=quizCards.length;
  const msgs=['もう少し頑張って！','いい調子！','なかなか良い！','素晴らしい！','完璧！'];
  document.getElementById('res-msg').textContent=msgs[Math.min(Math.floor(good/quizCards.length*4),4)];
  const list=document.getElementById('result-list'); list.innerHTML='';
  quizResults.forEach((r,i)=>{
    const badge=r.result==='good'?'badge-good':r.result==='soso'?'badge-so-so':'badge-bad';
    const icon=r.result==='good'?'⭕':r.result==='soso'?'△':'❌';
    const item=document.createElement('div'); item.className='result-item';
    item.innerHTML=`<div class="result-badge ${badge}">${icon}</div><div style="flex:1"><div class="result-word">${escNl(r.card.front)}</div><div class="result-answer" id="ans-${i}">${escNl(r.card.back)}</div></div>`;
    item.addEventListener('click',()=>document.getElementById(`ans-${i}`).classList.toggle('visible'));
    list.appendChild(item);
  });
  showScreen('screen-result');
}

// ── Reverse ──
window.toggleReverse = () => {
  isReverse=!isReverse;
  document.getElementById('reverse-switch').classList.toggle('on',isReverse);
};

// ── Save card ──
window.saveCard = async () => {
  const front=document.getElementById('add-front').value.trim();
  const back =document.getElementById('add-back').value.trim();
  const memo =document.getElementById('add-memo').value.trim();
  const group=document.getElementById('add-group').value||'未分類';
  const editId=document.getElementById('edit-id').value;
  const errEl=document.getElementById('add-error');
  errEl.innerHTML='';
  if (!front||!back){ errEl.innerHTML='<div class="alert alert-error">表面と裏面は必須です</div>'; return; }
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try {
    if (editId) {
      await updateDoc(doc(db,`users/${currentUser.uid}/cards/${editId}`),{front,back,memo,group,updatedAt:Timestamp.now()});
      lastSavedId=editId;
    } else {
      const ref=await addDoc(cardsRef(),{front,back,memo,group,createdAt:Timestamp.now(),updatedAt:Timestamp.now(),nextDate:Timestamp.fromDate(new Date()),score:0});
      lastSavedId=ref.id;
    }
    await loadCards();
    document.getElementById('post-save').style.display='';
    btn.disabled=false; btn.textContent='💾 保存';
  } catch(e){
    errEl.innerHTML=`<div class="alert alert-error">保存に失敗しました: ${e.message}</div>`;
    btn.disabled=false; btn.textContent='💾 保存';
  }
};
window.continueAdd = () => {
  ['add-front','add-back','add-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('edit-id').value='';
  document.getElementById('post-save').style.display='none';
  document.getElementById('add-front').focus();
};
window.editJustSaved = () => {
  const c=allCards.find(x=>x.id===lastSavedId);
  if (c) loadEditForm(c);
  document.getElementById('post-save').style.display='none';
};
function loadEditForm(card) {
  addCalledFromList = true;
  document.getElementById('edit-id').value=card.id;
  document.getElementById('add-front').value=card.front;
  document.getElementById('add-back').value=card.back;
  document.getElementById('add-memo').value=card.memo||'';
  document.getElementById('add-error').innerHTML='';
  document.getElementById('post-save').style.display='none';
  document.getElementById('add-title').textContent='単語を編集';
  document.getElementById('btn-save').textContent='💾 更新する';
  document.getElementById('new-group-row').style.display='none';
  rebuildSelects();
  document.getElementById('add-group').value=card.group||'未分類';
  showScreen('screen-add');
}

// ── Card list ──
window.setSort = (s) => {
  currentSort=s;
  document.querySelectorAll('.sort-chip').forEach(c=>c.classList.toggle('active',c.dataset.sort===s));
  renderCardList();
};
function renderCardList() {
  const filterG=document.getElementById('list-filter').value;
  let cards=[...allCards];
  if (filterG!=='__all__') cards=cards.filter(c=>(c.group||'未分類')===filterG);
  if (currentSort==='newest') cards.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  else if (currentSort==='oldest') cards.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
  else if (currentSort==='az') cards.sort((a,b)=>a.front.localeCompare(b.front));
  else if (currentSort==='unmemorized') cards.sort((a,b)=>{
    const ad=a.nextDate?a.nextDate.toDate():new Date(0);
    const bd=b.nextDate?b.nextDate.toDate():new Date(0);
    return ad-bd;
  });
  const con=document.getElementById('card-list-view');
  if (!cards.length){ con.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div>単語がありません</div></div>'; return; }
  con.innerHTML=cards.map((card,i)=>{
    const due=card.nextDate?card.nextDate.toDate().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}):'今日';
    const hasMemo=!!(card.memo&&card.memo.trim());
    const memoHtml=hasMemo
      ?`<div class="cli-memo-btn" onclick="toggleCliMemo('cli-memo-${i}',this)">📝 メモを見る</div>
        <div class="cli-memo-body" id="cli-memo-${i}" style="display:none">${escNl(card.memo)}</div>`
      :'';
    return `<div class="card-list-item">
      <span class="cli-group-tag">${esc(card.group||'未分類')}</span>
      <div class="cli-front">${escNl(card.front)}</div>
      <div class="cli-back">${escNl(card.back)}</div>
      ${memoHtml}
      <div class="cli-meta"><span>📅 次回: ${due}</span><span>⭐ ${card.score||0}</span></div>
      <div class="cli-actions">
        <button class="cli-btn" onclick='editCard(${JSON.stringify(card.id)})'>✏️ 編集</button>
        <button class="cli-btn del" onclick='deleteCard(${JSON.stringify(card.id)})'>🗑 削除</button>
      </div></div>`;
  }).join('');
}
window.editCard = (id) => { const c=allCards.find(x=>x.id===id); if(c)loadEditForm(c); };
window.deleteCard = async (id) => {
  if (!confirm('このカードを削除しますか？')) return;
  await deleteDoc(doc(db,`users/${currentUser.uid}/cards/${id}`));
  allCards=allCards.filter(c=>c.id!==id);
  renderCardList(); updateStats();
};

// ── Speech ──
window.speakCurrent = () => {
  if (quizIndex>=quizCards.length) return;
  const card=quizCards[quizIndex];
  speakText(isReverse?card.back:card.front, isReverse?'ja-JP':'en-US');
};
function speakText(text, lang='en-US') {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=0.9; u.volume=soundVol;
  speechSynthesis.speak(u);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// 改行を <br> に変換するバージョン（一覧表示用）
function escNl(s){ return esc(s).replace(/\n/g,'<br>'); }

// ── ロゴクリックでホームへ ──
window.goHome = () => {
  if (!currentUser) return;
  stopTimer();
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  showScreen('screen-home');
};

// ── 編集キャンセル: 一覧から開いた場合は一覧へ、新規の場合はホームへ ──
let addCalledFromList = false;
window.cancelAdd = () => {
  if (addCalledFromList) showScreen('screen-list');
  else showScreen('screen-home');
};

// ── 一覧のメモ表示トグル ──
window.toggleCliMemo = (id, btn) => {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display === 'none' || el.style.display === '';
  el.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '📝 メモを閉じる' : '📝 メモを見る';
};
</script>
</body>
</html>
